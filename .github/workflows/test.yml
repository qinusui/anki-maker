name: 测试安装包

on:
  workflow_dispatch:      # 仅手动触发

jobs:
  test:
    runs-on: windows-latest   # 微软提供的干净 Windows 11 环境

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 构建前端
        working-directory: frontend
        run: |
          npm install
          npm run build
          dir dist

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 下载 ffmpeg
        run: |
          if (!(Test-Path bin)) { New-Item -ItemType Directory -Path bin }
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          copy ffmpeg_tmp\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe bin\
          copy ffmpeg_tmp\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe bin\

      - name: 安装依赖并打包
        run: |
          pip install pyinstaller fastapi uvicorn openai genanki pysrt python-dotenv python-multipart
          pyinstaller ClipLingo.spec --clean -y

      - name: 测试程序启动
        run: |
          dist\ClipLingo\ClipLingo.exe --version

      - name: 编译安装包
        run: |
          choco install innosetup -y
          iscc installer.iss

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: ClipLingo_Setup
          path: installer\ClipLingo_Setup.exe
          retention-days: 7     # 保留 7 天
